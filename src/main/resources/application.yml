server:
  port: 8080

spring:
  application:
    name: ai-stock-selector-java
  thymeleaf:
    cache: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      show-components: always
  info:
    build:
      enabled: true
    env:
      enabled: true

# Server酱(微信推送)SendKey:默认空,可由环境变量 SERVERCHAN_SENDKEY 覆盖。
serverchan:
  sendkey: ${SERVERCHAN_SENDKEY:}

# 每日定时任务:到点自动刷新行情 + 生成当日选股信号 + Server酱推送到微信
# (对标 Python 原版独立 compose scheduler service)。
scheduler:
  # 总开关:默认 false——本地开发 / 测试不误触发,不注册调度 Bean。
  # Docker / 生产需自动推送时设 true(环境变量 SCHEDULER_ENABLED=true,relaxed binding)。
  enabled: ${SCHEDULER_ENABLED:false}
  # 触发 cron(Spring 6 段:秒 分 时 日 月 周),使用【服务器本地时区】。
  # 默认每个工作日 16:30(A股收盘后)推送一次。环境变量 SCHEDULER_CRON 覆盖。
  cron: ${SCHEDULER_CRON:0 30 16 * * MON-FRI}
  # 要跑哪些 market 的推送,逗号分隔;默认美股 + A股。环境变量 SCHEDULER_MARKETS 覆盖。
  markets: ${SCHEDULER_MARKETS:us,cn}

# 市场配置:code 小篮子与缓存目录(不写死在 Java 业务里)。
# 缓存目录(SQLite + 行情缓存)默认沿用本机现状 ./.cache;
# 可由环境变量 MARKET_CACHE_DIR 覆盖(Docker 里指向挂载卷 /data 做持久化)。
market:
  cache-dir: ${MARKET_CACHE_DIR:./.cache}
  # 行情面板 + 回测结果按 market 缓存的 TTL(秒),对标 Python st.cache_data(ttl=1800)。
  # 默认 30 分钟;命中即毫秒级返回,点页面「刷新最新数据」可立即失效重拉。
  cache-ttl-seconds: ${MARKET_CACHE_TTL_SECONDS:1800}
  # 篮子只是「候选池」,topN 是从池中按打分选前 N;池子必须 > topN 才能选满。
  # 以下为常见大盘股,中性选取(无任何涨跌暗示),可自由增删。
  us:
    - AAPL
    - MSFT
    - NVDA
    - GOOGL
    - AMZN
    - META
    - TSLA
    - AVGO
    - JPM
    - V
    - WMT
    - MA
    - UNH
    - XOM
    - JNJ
    - PG
    - HD
    - COST
    - ORCL
    - NFLX
  cn:
    - "600519"
    - "000001"
    - "601318"
    - "600036"
    - "000333"
    - "300750"
    - "002594"
    - "601899"
    - "600900"
    - "601166"
    - "600276"
    - "000858"
    - "002415"
    - "600030"
    - "601012"
    - "300059"
    - "000651"
    - "601888"
    - "600887"
    - "601668"
